<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemma Agent - Discord Bot</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background-color: #1e293b;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #38bdf8;
            margin-bottom: 0.5rem;
        }
        p {
            color: #94a3b8;
            margin-bottom: 2rem;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        a {
            color: #38bdf8;
            text-decoration: none;
            padding: 0.75rem;
            border: 1px solid #38bdf8;
            border-radius: 6px;
            transition: all 0.2s ease;
        }
        a:hover {
            background-color: #38bdf8;
            color: #0f172a;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gemma Agent</h1>
        <p>Offizielle Dokumentation & Rechtliches</p>
        <div class="links">
            <a href="terms.md">Nutzungsbedingungen (ToS)</a>
            <a href="privacy.md">Datenschutzerklärung</a>
        </div>
    </div>
</body>
</html>
